# ============================================================
# mappo_gnn.yaml — Phase 5: MAPPO + GNN network upgrade
# Fine-tunes from Phase 3 Stage 4 checkpoint.
# ============================================================

_base: mappo_mlp.yaml

algorithm: MAPPO

network:
  type: GNN
  gnn_type: GAT             # Graph Attention Network (handles variable neighbors)
  node_hidden: 64
  edge_hidden: 32
  n_gnn_layers: 2
  neighbor_radius: 5.0      # metres — edges created within this radius
  actor_hidden: [64, 64]
  critic_hidden: [128, 128]
  use_layer_norm: true
  share_parameters: true

curriculum:
  enabled: true
  start_stage: 4            # start from Stage 4 (6 drones, 15x15)

domain_randomization:
  enabled: true             # keep DR on for GNN phase

training:
  total_timesteps: 5_000_000
  checkpoint_every: 100_000
  eval_every: 50_000
  eval_episodes: 20
  log_dir: logs/mappo_gnn
  resume_from: null         # set to logs/mappo_mlp_dr/ckpt_best.pt
  device: cuda
